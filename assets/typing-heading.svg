<svg xmlns="http://www.w3.org/2000/svg" width="400" height="50" viewBox="0 0 400 50">
  <defs>
    <clipPath id="reveal">
      <rect x="0" y="0" height="50">
        <animate attributeName="width"
          values="0;19;38;57;76;95;95;114;133;152;171;190;209;228;247"
          keyTimes="0;0.067;0.133;0.2;0.267;0.333;0.444;0.511;0.578;0.644;0.711;0.778;0.844;0.911;1"
          dur="9s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Text revealed character by character -->
  <text x="0" y="36" font-family="monospace" font-size="32" font-weight="600" fill="#ffffff" clip-path="url(#reveal)">Hey, I'm Kyle</text>

  <!-- Blinking cursor -->
  <rect y="8" width="3" height="32" rx="1" fill="#ffffff">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="x"
      values="1;20;39;58;77;96;96;115;134;153;172;191;210;229;248"
      keyTimes="0;0.067;0.133;0.2;0.267;0.333;0.444;0.511;0.578;0.644;0.711;0.778;0.844;0.911;1"
      dur="9s" fill="freeze"/>
  </rect>
</svg>
