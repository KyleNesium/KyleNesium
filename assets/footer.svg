<svg xmlns="http://www.w3.org/2000/svg" width="600" height="18" viewBox="0 0 600 18">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" result="blur">
        <animate attributeName="stdDeviation" values="1;2.5;1" dur="6s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.55 0 0 0 0 0.34 0 0 0 0.7 0" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Left line -->
  <line x1="0" y1="9" x2="175" y2="9" stroke="#2E8B57" stroke-width="0.5" filter="url(#glow)">
    <animate attributeName="x2" values="165;185;165" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.15;0.5;0.15" dur="8s" repeatCount="indefinite"/>
  </line>

  <!-- Diamond 1 -->
  <rect x="192" y="3" width="10" height="10" fill="none" stroke="#3CB371" stroke-width="0.7" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="45 197 8;405 197 8" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Dot 1 -->
  <circle cx="225" cy="9" r="1.5" fill="#2E8B57" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Triangle -->
  <polygon points="250,3 257,15 243,15" fill="none" stroke="#3CB371" stroke-width="0.5" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="0 250 9;-360 250 9" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.2;0.6;0.2" dur="6s" repeatCount="indefinite"/>
  </polygon>

  <!-- Center hexagon -->
  <polygon points="300,1 310,5 310,13 300,17 290,13 290,5" fill="none" stroke="#2E8B57" stroke-width="0.7" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="0 300 9;360 300 9" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="6s" repeatCount="indefinite"/>
  </polygon>

  <!-- Center pulsing dot -->
  <circle cx="300" cy="9" r="1.2" fill="#3CB371" filter="url(#glow)">
    <animate attributeName="r" values="0.8;2;0.8" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Triangle 2 -->
  <polygon points="350,3 357,15 343,15" fill="none" stroke="#3CB371" stroke-width="0.5" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="0 350 9;360 350 9" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.2;0.6;0.2" dur="6s" repeatCount="indefinite"/>
  </polygon>

  <!-- Dot 2 -->
  <circle cx="375" cy="9" r="1.5" fill="#2E8B57" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="4s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Diamond 2 -->
  <rect x="395" y="3" width="10" height="10" fill="none" stroke="#2E8B57" stroke-width="0.7" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="45 400 8;-315 400 8" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Right line -->
  <line x1="420" y1="9" x2="600" y2="9" stroke="#2E8B57" stroke-width="0.5" filter="url(#glow)">
    <animate attributeName="x1" values="425;415;425" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.15;0.5;0.15" dur="8s" repeatCount="indefinite"/>
  </line>
</svg>
