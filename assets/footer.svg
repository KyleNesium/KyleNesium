<svg xmlns="http://www.w3.org/2000/svg" width="900" height="60" viewBox="0 0 900 60">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" result="blur">
        <animate attributeName="stdDeviation" values="1;3;1" dur="6s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.55 0 0 0 0 0.34 0 0 0 0.6 0" result="greenGlow"/>
      <feMerge>
        <feMergeNode in="greenGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Animated line left -->
  <line x1="0" y1="30" x2="350" y2="30" stroke="#2E8B57" stroke-width="1" filter="url(#glow)">
    <animate attributeName="x2" values="300;380;300" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="8s" repeatCount="indefinite"/>
  </line>

  <!-- Small diamond left -->
  <rect x="370" y="24" width="12" height="12" fill="none" stroke="#3CB371" stroke-width="1" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="45 376 30;405 376 30" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Center dot -->
  <circle cx="450" cy="30" r="3" fill="#2E8B57" filter="url(#glow)">
    <animate attributeName="r" values="2;4;2" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Small diamond right -->
  <rect x="518" y="24" width="12" height="12" fill="none" stroke="#3CB371" stroke-width="1" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="45 524 30;-315 524 30" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Animated line right -->
  <line x1="550" y1="30" x2="900" y2="30" stroke="#2E8B57" stroke-width="1" filter="url(#glow)">
    <animate attributeName="x1" values="600;520;600" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="8s" repeatCount="indefinite"/>
  </line>
</svg>
