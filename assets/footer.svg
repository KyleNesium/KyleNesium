<svg xmlns="http://www.w3.org/2000/svg" width="800" height="24" viewBox="0 0 800 24">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" result="blur">
        <animate attributeName="stdDeviation" values="1;2.5;1" dur="6s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.55 0 0 0 0 0.34 0 0 0 0.7 0" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Left line -->
  <line x1="0" y1="12" x2="240" y2="12" stroke="#2E8B57" stroke-width="0.6" filter="url(#glow)">
    <animate attributeName="x2" values="220;260;220" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.15;0.5;0.15" dur="8s" repeatCount="indefinite"/>
  </line>

  <!-- Diamond 1 -->
  <rect x="258" y="6" width="12" height="12" fill="none" stroke="#3CB371" stroke-width="0.8" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="45 264 12;405 264 12" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Dot 1 -->
  <circle cx="300" cy="12" r="2" fill="#2E8B57" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Triangle -->
  <polygon points="330,5 338,19 322,19" fill="none" stroke="#3CB371" stroke-width="0.6" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="0 330 12;-360 330 12" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.2;0.6;0.2" dur="6s" repeatCount="indefinite"/>
  </polygon>

  <!-- Center hexagon -->
  <polygon points="400,2 412,7 412,17 400,22 388,17 388,7" fill="none" stroke="#2E8B57" stroke-width="0.8" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="0 400 12;360 400 12" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="6s" repeatCount="indefinite"/>
  </polygon>

  <!-- Center pulsing dot -->
  <circle cx="400" cy="12" r="1.5" fill="#3CB371" filter="url(#glow)">
    <animate attributeName="r" values="1;2.5;1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Triangle 2 -->
  <polygon points="470,5 478,19 462,19" fill="none" stroke="#3CB371" stroke-width="0.6" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="0 470 12;360 470 12" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.2;0.6;0.2" dur="6s" repeatCount="indefinite"/>
  </polygon>

  <!-- Dot 2 -->
  <circle cx="500" cy="12" r="2" fill="#2E8B57" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="4s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Diamond 2 -->
  <rect x="530" y="6" width="12" height="12" fill="none" stroke="#2E8B57" stroke-width="0.8" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="45 536 12;-315 536 12" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Right line -->
  <line x1="560" y1="12" x2="800" y2="12" stroke="#2E8B57" stroke-width="0.6" filter="url(#glow)">
    <animate attributeName="x1" values="580;540;580" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.15;0.5;0.15" dur="8s" repeatCount="indefinite"/>
  </line>
</svg>
