<svg xmlns="http://www.w3.org/2000/svg" width="120" height="40" viewBox="0 0 120 40">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" result="blur">
        <animate attributeName="stdDeviation" values="1;3;1" dur="6s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.55 0 0 0 0 0.34 0 0 0 0.7 0" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Line -->
  <line x1="0" y1="20" x2="25" y2="20" stroke="#2E8B57" stroke-width="0.8" filter="url(#glow)">
    <animate attributeName="x2" values="20;30;20" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.2;0.7;0.2" dur="8s" repeatCount="indefinite"/>
  </line>

  <!-- Diamond -->
  <rect x="30" y="14" width="12" height="12" fill="none" stroke="#3CB371" stroke-width="0.8" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="45 36 20;405 36 20" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Dot -->
  <circle cx="55" cy="20" r="2" fill="#2E8B57" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Hexagon -->
  <polygon points="70,12 78,16 78,24 70,28 62,24 62,16" fill="none" stroke="#2E8B57" stroke-width="0.8" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="0 70 20;360 70 20" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="6s" repeatCount="indefinite"/>
  </polygon>

  <!-- Triangle -->
  <polygon points="88,14 96,26 80,26" fill="none" stroke="#3CB371" stroke-width="0.6" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="0 88 20;-360 88 20" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.2;0.6;0.2" dur="6s" repeatCount="indefinite"/>
  </polygon>

  <!-- End line -->
  <line x1="100" y1="20" x2="120" y2="20" stroke="#2E8B57" stroke-width="0.8" filter="url(#glow)">
    <animate attributeName="x1" values="105;95;105" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.2;0.7;0.2" dur="8s" repeatCount="indefinite"/>
  </line>
</svg>
