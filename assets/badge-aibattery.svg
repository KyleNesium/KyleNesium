<svg xmlns="http://www.w3.org/2000/svg" width="138" height="32" viewBox="0 0 138 32">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" result="blur" stdDeviation="1.5"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.55 0 0 0 0 0.34 0 0 0 0.5 0" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="136" height="30" rx="15" ry="15" fill="none" stroke="#2E8B57" stroke-width="0.8" opacity="0.6" filter="url(#glow)"/>
  <!-- Battery icon -->
  <rect x="14" y="10" width="14" height="12" rx="1.5" ry="1.5" fill="none" stroke="#3CB371" stroke-width="1" opacity="0.8"/>
  <rect x="28" y="13" width="2" height="6" rx="0.5" ry="0.5" fill="#3CB371" opacity="0.8"/>
  <rect x="16.5" y="12.5" width="4" height="7" rx="0.5" fill="#3CB371" opacity="0.6"/>
  <rect x="21.5" y="14.5" width="4" height="5" rx="0.5" fill="#3CB371" opacity="0.4"/>
  <text x="40" y="20.5" font-family="Inter, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#3CB371" opacity="0.85" letter-spacing="0.5">AI Battery</text>
</svg>
