<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" result="blur">
        <animate attributeName="stdDeviation" values="1;3;1" dur="6s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.55 0 0 0 0 0.34 0 0 0 0.6 0" result="greenGlow"/>
      <feMerge>
        <feMergeNode in="greenGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rotating hexagon -->
  <polygon points="100,20 145,45 145,95 100,120 55,95 55,45" fill="none" stroke="#2E8B57" stroke-width="1.5" filter="url(#glow)" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" values="0 100 70;360 100 70" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="6s" repeatCount="indefinite"/>
  </polygon>

  <!-- Counter-rotating diamond -->
  <rect x="75" y="55" width="50" height="50" fill="none" stroke="#3CB371" stroke-width="1" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" values="45 100 80;-315 100 80" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Pulsing circle -->
  <circle cx="100" cy="75" r="35" fill="none" stroke="#2E8B57" stroke-width="1" opacity="0.4">
    <animate attributeName="r" values="35;42;35" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.2;0.6;0.2" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- Small orbiting dot -->
  <circle cx="100" cy="30" r="3" fill="#3CB371" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" values="0 100 75;360 100 75" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Inner triangle -->
  <polygon points="100,50 125,90 75,90" fill="none" stroke="#3CB371" stroke-width="0.8" opacity="0.4">
    <animateTransform attributeName="transform" type="rotate" values="0 100 75;-360 100 75" dur="25s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.2;0.5;0.2" dur="7s" repeatCount="indefinite"/>
  </polygon>
</svg>
