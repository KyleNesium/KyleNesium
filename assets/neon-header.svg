<svg xmlns="http://www.w3.org/2000/svg" width="700" height="140" viewBox="0 0 700 140">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" result="blur">
        <animate attributeName="stdDeviation" values="2;6;2" dur="3s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.55 0 0 0 0 0.34 0 0 0 1 0" result="greenGlow"/>
      <feMerge>
        <feMergeNode in="greenGlow"/>
        <feMergeNode in="greenGlow"/>
        <feMergeNode in="greenGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lineGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceGraphic" result="blur">
        <animate attributeName="stdDeviation" values="1;4;1" dur="3s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.24 0 0 0 0 0.7 0 0 0 0 0.44 0 0 0 0.8 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Left decorative line -->
  <line x1="80" y1="70" x2="200" y2="70" stroke="#2E8B57" stroke-width="1.5" filter="url(#lineGlow)">
    <animate attributeName="x1" values="100;80;100" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Right decorative line -->
  <line x1="500" y1="70" x2="620" y2="70" stroke="#2E8B57" stroke-width="1.5" filter="url(#lineGlow)">
    <animate attributeName="x2" values="600;620;600" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Left bracket -->
  <text x="210" y="82" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace" font-weight="300" font-size="48" fill="#3CB371" filter="url(#lineGlow)">
    [
    <animate attributeName="fill-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Right bracket -->
  <text x="490" y="82" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace" font-weight="300" font-size="48" fill="#3CB371" filter="url(#lineGlow)">
    ]
    <animate attributeName="fill-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Main text -->
  <text x="350" y="82" text-anchor="middle" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="40" fill="#ffffff" filter="url(#glow)">
    Hey, I'm Kyle
  </text>

  <!-- Subtle underline glow -->
  <line x1="240" y1="98" x2="460" y2="98" stroke="#2E8B57" stroke-width="1" filter="url(#lineGlow)">
    <animate attributeName="stroke-opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x1" values="280;240;280" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="420;460;420" dur="3s" repeatCount="indefinite"/>
  </line>
</svg>
