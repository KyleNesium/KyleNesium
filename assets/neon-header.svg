<svg xmlns="http://www.w3.org/2000/svg" width="600" height="80" viewBox="0 0 600 80">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" result="blur">
        <animate attributeName="stdDeviation" values="2;8;2" dur="6s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.55 0 0 0 0 0.34 0 0 0 0.9 0" result="greenGlow"/>
      <feMerge>
        <feMergeNode in="greenGlow"/>
        <feMergeNode in="greenGlow"/>
        <feMergeNode in="greenGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- "Hey, I'm" light -->
  <text x="220" y="50" text-anchor="middle" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-weight="300" font-size="30" fill="#2E8B57" opacity="0">
    Hey, I'm
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.1;0.4" dur="3s" fill="freeze"/>
  </text>

  <!-- "Kyle" with neon glow -->
  <text x="370" y="50" text-anchor="middle" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="36" fill="#2E8B57" filter="url(#glow)" opacity="0">
    Kyle
    <animate attributeName="opacity" values="0;0;0;1" keyTimes="0;0.3;0.45;0.7" dur="3s" fill="freeze"/>
  </text>

  <!-- Blinking cursor -->
  <rect x="408" y="28" width="2" height="26" fill="#2E8B57">
    <animate attributeName="fill-opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
    <animate attributeName="x" values="180;280;280;408;408" keyTimes="0;0.2;0.3;0.55;1" dur="3s" fill="freeze"/>
  </rect>
</svg>
