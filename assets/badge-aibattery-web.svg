<svg xmlns="http://www.w3.org/2000/svg" width="150" height="32" viewBox="0 0 150 32">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" result="blur" stdDeviation="1.5"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.55 0 0 0 0 0.34 0 0 0 0.5 0" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="148" height="30" rx="15" ry="15" fill="none" stroke="#2E8B57" stroke-width="0.8" opacity="0.6" filter="url(#glow)"/>
  <!-- Globe icon -->
  <circle cx="20" cy="16" r="7" fill="none" stroke="#3CB371" stroke-width="1" opacity="0.8"/>
  <ellipse cx="20" cy="16" rx="3.5" ry="7" fill="none" stroke="#3CB371" stroke-width="0.7" opacity="0.6"/>
  <line x1="13" y1="16" x2="27" y2="16" stroke="#3CB371" stroke-width="0.7" opacity="0.6"/>
  <text x="34" y="20.5" font-family="Inter, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#3CB371" opacity="0.85" letter-spacing="0.5">aibattery.dev</text>
</svg>
