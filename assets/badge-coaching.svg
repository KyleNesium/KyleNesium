<svg xmlns="http://www.w3.org/2000/svg" width="148" height="32" viewBox="0 0 148 32">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" result="blur" stdDeviation="1.5"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.55 0 0 0 0 0.34 0 0 0 0.5 0" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="146" height="30" rx="15" ry="15" fill="none" stroke="#2E8B57" stroke-width="1" filter="url(#glow)"/>
  <!-- Compass/safari icon -->
  <circle cx="23" cy="16" r="7" fill="none" stroke="#3CB371" stroke-width="1.2"/>
  <polygon points="21,11 26,14 25,21 20,18" fill="none" stroke="#3CB371" stroke-width="1" stroke-linejoin="round"/>
  <text x="40" y="20.5" font-family="Inter, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="500" fill="#3CB371" letter-spacing="0.5">virtus.coach</text>
</svg>
