<svg xmlns="http://www.w3.org/2000/svg" width="40" height="300" viewBox="0 0 40 300">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" result="blur">
        <animate attributeName="stdDeviation" values="1;3;1" dur="6s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.55 0 0 0 0 0.34 0 0 0 0.7 0" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Top line -->
  <line x1="20" y1="0" x2="20" y2="60" stroke="#2E8B57" stroke-width="0.8" filter="url(#glow)">
    <animate attributeName="y2" values="50;70;50" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.2;0.7;0.2" dur="8s" repeatCount="indefinite"/>
  </line>

  <!-- Diamond top -->
  <rect x="14" y="70" width="12" height="12" fill="none" stroke="#3CB371" stroke-width="0.8" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="45 20 76;405 20 76" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Dot -->
  <circle cx="20" cy="100" r="2" fill="#2E8B57" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Triangle -->
  <polygon points="20,115 28,130 12,130" fill="none" stroke="#3CB371" stroke-width="0.6" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="0 20 122;-360 20 122" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.2;0.6;0.2" dur="6s" repeatCount="indefinite"/>
  </polygon>

  <!-- Hexagon center -->
  <polygon points="20,138 30,144 30,156 20,162 10,156 10,144" fill="none" stroke="#2E8B57" stroke-width="1" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="0 20 150;360 20 150" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="6s" repeatCount="indefinite"/>
  </polygon>

  <!-- Center pulse -->
  <circle cx="20" cy="150" r="2" fill="#3CB371" filter="url(#glow)">
    <animate attributeName="r" values="1.5;3;1.5" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Triangle bottom -->
  <polygon points="20,170 28,185 12,185" fill="none" stroke="#3CB371" stroke-width="0.6" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="0 20 177;360 20 177" dur="18s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.2;0.6;0.2" dur="6s" repeatCount="indefinite"/>
  </polygon>

  <!-- Dot -->
  <circle cx="20" cy="200" r="2" fill="#2E8B57" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="4s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Diamond bottom -->
  <rect x="14" y="215" width="12" height="12" fill="none" stroke="#3CB371" stroke-width="0.8" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" values="45 20 221;-315 20 221" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom line -->
  <line x1="20" y1="240" x2="20" y2="300" stroke="#2E8B57" stroke-width="0.8" filter="url(#glow)">
    <animate attributeName="y1" values="250;230;250" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.2;0.7;0.2" dur="8s" repeatCount="indefinite"/>
  </line>
</svg>
